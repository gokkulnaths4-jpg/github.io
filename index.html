<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIXLD | Pixels in Progress</title>

<link rel="icon" type="image/png" href="https://i.postimg.cc/CKnQf09Y/Logo-Assets-02.png">
<meta name="theme-color" content="#000000">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
}

body {
  min-height: 100vh;
  font-family: 'Manrope', sans-serif;
  color: #ffffff;

  background-image: url("https://i.postimg.cc/MHp4HBwx/Landing-Page-Background.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-color: #000;

  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

@media (max-width: 768px) {
  body {
    background-image: url("https://i.postimg.cc/gjgCHDsm/Landing-Page-Background-1080x1920.png");
  }
}

/* ===== GLASS PANEL ===== */
.container {
  max-width: 900px;
  padding: 70px 60px;
  text-align: center;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 40px 80px rgba(0,0,0,0.6),
    inset 0 0 40px rgba(255,255,255,0.02);

  animation: fadeUp 1s cubic-bezier(.16,1,.3,1) forwards;
  opacity: 0;
}

/* ===== HEADLINE ===== */
h1 {
  font-size: clamp(2.6rem, 5vw, 4.3rem);
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 1.05;
  margin-bottom: 30px;
  text-shadow: 0 4px 30px rgba(0,0,0,0.9);
}

/* Glowing period */
h1 span {
  color: #ff2e63;
  animation: glowDot 2.5s ease-in-out infinite alternate;
}

@keyframes glowDot {
  from { text-shadow: 0 0 5px #ff2e63; }
  to   { text-shadow: 0 0 25px #ff2e63; }
}

/* ===== DESCRIPTION (3 LINES FORCED) ===== */
.description {
  font-size: clamp(1.05rem, 2.2vw, 1.4rem);
  line-height: 1.8;
  font-weight: 400;
  max-width: 680px;
  margin: 0 auto 75px auto;
  text-shadow: 0 4px 20px rgba(0,0,0,0.8);
}

/* ===== SUB TEXT ===== */
.sub-text {
  font-size: clamp(1rem, 2vw, 1.2rem);
  margin-bottom: 26px;
  letter-spacing: 0.2px;
  opacity: 0;
  animation: fadeIn 1s ease 0.8s forwards;
}

/* ===== BUTTON ===== */
.cta-button {
  display: inline-block;
  padding: 14px 42px;
  border-radius: 50px;
  border: 2px solid #ff2e63;
  color: #ffffff;
  text-decoration: none;
  font-weight: 600;
  letter-spacing: 0.4px;
  transition: all .35s cubic-bezier(.16,1,.3,1);
  margin-bottom: 50px;
  opacity: 0;
  animation: fadeIn 1s ease 1.1s forwards;
}

.cta-button:hover {
  background: #ff2e63;
  box-shadow: 0 0 40px rgba(255, 46, 99, 0.9);
  transform: translateY(-4px) scale(1.03);
}

/* ===== SOCIAL ICONS ===== */
.social-icons {
  display: flex;
  justify-content: center;
  gap: 30px;
  font-size: 1.5rem;
  opacity: 0;
  animation: fadeIn 1s ease 1.4s forwards;
}

.social-icons a {
  color: #ffffff;
  transition: all .3s ease;
}

.social-icons a:hover {
  transform: translateY(-6px);
  color: #ff2e63;
  text-shadow: 0 0 20px #ff2e63;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .container {
    padding: 50px 25px;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>Pixels in progress<span>.</span></h1>

  <p class="description">
    We’re aligning grids, refining details,<br>
    and building something bold behind the scenes.<br>
    Pixld’s new digital space is on its way.
  </p>

  <p class="sub-text">
    Need to reach us meanwhile?
  </p>

  <a href="mailto:info@pixldglobal.com" class="cta-button">
    Let’s Talk
  </a>

  <div class="social-icons">
    <a href="https://www.instagram.com/pixld.global" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-linkedin-in"></i></a>
    <a href="#"><i class="fab fa-whatsapp"></i></a>
  </div>

</div>

</body>
</html>
