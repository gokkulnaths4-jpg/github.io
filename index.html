<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PIXLD | Pixels in Progress</title>

  <link rel="icon" type="image/png" href="https://i.postimg.cc/CKnQf09Y/Logo-Assets-02.png">
  <meta name="theme-color" content="#000000">

  <!-- Font Awesome for Social Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;

      background-image: url("https://i.postimg.cc/MHp4HBwx/Landing-Page-Background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #000;

      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Dark overlay for readability */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(2px);
      z-index: 0;
    }

    @media (max-width: 768px) {
      body {
        background-image: url("https://i.postimg.cc/gjgCHDsm/Landing-Page-Background-1080x1920.png");
      }
    }

    .container {
      max-width: 900px;
      position: relative;
      z-index: 1;
      animation: fadeUp 1s ease forwards;
      opacity: 0;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: -1px;
    }

    .description {
      font-size: clamp(1rem, 2.2vw, 1.5rem);
      line-height: 1.6;
      opacity: 0.9;
      margin-bottom: 60px;
    }

    .sub-text {
      font-size: clamp(1rem, 2vw, 1.4rem);
      margin-bottom: 20px;
      opacity: 0.85;
    }

    .cta-button {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 50px;
      border: 2px solid #ff2e63;
      color: #ffffff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: 0.3s ease;
      margin-bottom: 40px;
    }

    .cta-button:hover {
      background-color: #ff2e63;
      box-shadow: 0 0 25px rgba(255, 46, 99, 0.8);
    }

    /* Social Icons */
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 25px;
      font-size: 1.5rem;
    }

    .social-icons a {
      color: #ffffff;
      transition: 0.3s ease;
    }

    .social-icons a:hover {
      transform: translateY(-5px);
      text-shadow: 0 0 15px #ff2e63;
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .description {
        margin-bottom: 40px;
      }

      .social-icons {
        font-size: 1.3rem;
        gap: 20px;
      }
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Pixels in progress.</h1>

    <p class="description">
      We’re aligning grids, refining details, and building something bold behind the scenes.
      Pixld’s new digital space is on its way.
    </p>

    <p class="sub-text">
      Need to reach us meanwhile?
    </p>

    <a href="mailto:info@pixldglobal.com" class="cta-button">
      Let’s Talk
    </a>

    <div class="social-icons">
      <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="#" target="_blank"><i class="fab fa-linkedin-in"></i></a>
      <a href="https://wa.me/your-number" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>

  </div>

</body>
</html>
