<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIXLD | Pixels in Progress</title>

<link rel="icon" type="image/png" href="https://i.postimg.cc/CKnQf09Y/Logo-Assets-02.png">
<meta name="theme-color" content="#000000">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
}

body {
  min-height: 100vh;
  font-family: 'Manrope', sans-serif;
  color: #ffffff;

  background-image: url("https://i.postimg.cc/MHp4HBwx/Landing-Page-Background.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-color: #000;

  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
  overflow: hidden;
}

/* ===== GLOW LAYER ===== */
.glow-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  transition: background 0.3s ease;
  filter: blur(80px);
}

/* ===== CONTENT ===== */
.container {
  position: relative;
  z-index: 2;
  max-width: 900px;
  padding-top: 40px;
  animation: fadeUp 1s ease forwards;
  opacity: 0;
}

h1 {
  font-size: clamp(2.6rem, 5vw, 4.3rem);
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 1.08;
  margin-bottom: 30px;
  text-shadow: 0 4px 25px rgba(0,0,0,0.85);
}

.description {
  font-size: clamp(1.05rem, 2.2vw, 1.45rem);
  font-weight: 400;
  line-height: 1.85;
  max-width: 680px;
  margin: 0 auto 75px auto;
  text-shadow: 0 4px 20px rgba(0,0,0,0.8);
}

.sub-text {
  font-size: clamp(1rem, 2vw, 1.3rem);
  margin-bottom: 26px;
  text-shadow: 0 3px 15px rgba(0,0,0,0.7);
}

.cta-button {
  display: inline-block;
  padding: 14px 40px;
  border-radius: 50px;
  border: 2px solid #ff2e63;
  color: #ffffff;
  text-decoration: none;
  font-weight: 600;
  letter-spacing: 0.4px;
  transition: all 0.35s ease;
  margin-bottom: 50px;
}

.cta-button:hover {
  background-color: #ff2e63;
  box-shadow: 0 0 35px rgba(255, 46, 99, 0.9);
  transform: translateY(-4px);
}

.social-icons {
  display: flex;
  justify-content: center;
  gap: 28px;
  font-size: 1.5rem;
}

.social-icons a {
  color: #ffffff;
  transition: all 0.3s ease;
}

.social-icons a:hover {
  transform: translateY(-6px);
  color: #ff2e63;
  text-shadow: 0 0 20px #ff2e63;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 768px) {
  body {
    background-image: url("https://i.postimg.cc/gjgCHDsm/Landing-Page-Background-1080x1920.png");
  }
}
</style>
</head>

<body>

<div class="glow-layer" id="glow"></div>

<div class="container">
  <h1>Pixels in progress.</h1>

  <p class="description">
    We’re aligning grids, refining details,<br>
    and building something bold behind the scenes.<br>
    Pixld’s new digital space is on its way.
  </p>

  <p class="sub-text">
    Need to reach us meanwhile?
  </p>

  <a href="mailto:info@pixldglobal.com" class="cta-button">
    Let’s Talk
  </a>

  <div class="social-icons">
    <a href="https://www.instagram.com/pixld.global" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-linkedin-in"></i></a>
    <a href="#"><i class="fab fa-whatsapp"></i></a>
  </div>
</div>

<script>
const glow = document.getElementById('glow');

document.addEventListener('mousemove', (e) => {
  const x = e.clientX / window.innerWidth * 100;
  const y = e.clientY / window.innerHeight * 100;

  glow.style.background = `
    radial-gradient(circle at ${x}% ${y}%, rgba(255,0,80,0.35), transparent 40%),
    radial-gradient(circle at ${100 - x}% ${y}%, rgba(0,120,255,0.35), transparent 40%),
    radial-gradient(circle at ${x}% ${100 - y}%, rgba(255,0,120,0.35), transparent 40%),
    radial-gradient(circle at ${100 - x}% ${100 - y}%, rgba(0,255,140,0.35), transparent 40%)
  `;
});
</script>

</body>
</html>
