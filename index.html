<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>PIXLD | Pixels in Progress</title>

  <link rel="icon" type="image/png" href="https://i.postimg.cc/CKnQf09Y/Logo-Assets-02.png">
  <meta name="theme-color" content="#000000">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Google Font: Manrope -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">


  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;

      background-image: url("https://i.postimg.cc/MHp4HBwx/Landing-Page-Background.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #000;

      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow: hidden;
    }

    @media (max-width: 768px) {
      body {
        background-image: url("https://i.postimg.cc/gjgCHDsm/Landing-Page-Background-1080x1920.png");
      }
    }

    .container {
      max-width: 900px;
      animation: fadeUp 1s ease forwards;
      opacity: 0;
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: -1px;
      text-shadow: 0 4px 25px rgba(0,0,0,0.8);
    }

    .description {
      font-size: clamp(1rem, 2.2vw, 1.5rem);
      line-height: 1.6;
      margin-bottom: 60px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }

    .sub-text {
      font-size: clamp(1rem, 2vw, 1.4rem);
      margin-bottom: 20px;
      text-shadow: 0 3px 15px rgba(0,0,0,0.7);
    }

    .cta-button {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 50px;
      border: 2px solid #ff2e63;
      color: #ffffff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: 0.3s ease;
      margin-bottom: 40px;
      backdrop-filter: blur(4px);
    }

    .cta-button:hover {
      background-color: #ff2e63;
      box-shadow: 0 0 30px rgba(255, 46, 99, 0.9);
      transform: translateY(-3px);
    }

    /* Social Icons */
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 25px;
      font-size: 1.5rem;
    }

    .social-icons a {
      color: #ffffff;
      transition: 0.3s ease;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    .social-icons a:hover {
      transform: translateY(-6px);
      color: #ff2e63;
      text-shadow: 0 0 20px #ff2e63;
    }

    /* Subtle Animated Glow Layer */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 30% 40%, rgba(255,0,80,0.08), transparent 40%),
                  radial-gradient(circle at 70% 60%, rgba(0,120,255,0.08), transparent 40%);
      animation: glowMove 10s linear infinite alternate;
    }

    @keyframes glowMove {
      from { transform: translateX(-20px) translateY(-20px); }
      to { transform: translateX(20px) translateY(20px); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .description {
        margin-bottom: 40px;
      }

      .social-icons {
        font-size: 1.3rem;
        gap: 20px;
      }
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Pixels in progress.</h1>

    <p class="description">
      We’re aligning grids, refining details, and building something bold behind the scenes.
      Pixld’s new digital space is on its way.
    </p>

    <p class="sub-text">
      Need to reach us meanwhile?
    </p>

    <a href="mailto:info@pixldglobal.com" class="cta-button">
      Let’s Talk
    </a>

    <div class="social-icons">
      <a href="https://www.instagram.com/pixld.global?igsh=dzUwdGszbGdpcm1i" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://www.facebook.com/share/1DC2e5FnYX/" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://www.linkedin.com/company/pixldglobal/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
      <a href="https://wa.me/0704999650" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>

  </div>

</body>
</html>
